name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive # Temanın yüklenmesi için önemli
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.158.0' # İstediğin spesifik versiyon
          extended: true

      - name: Build Hugo
        # EĞER dosyaların 'exampleSite' klasöründeyse aşağıdaki satırı tut, 
        # değilse 'working-directory' satırını tamamen sil!
        # working-directory: exampleSite 
        run: hugo --minify --baseURL="https://AhmedYasinArda.github.io/biyoist-sil/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Eğer working-directory kullandıysan burası 'exampleSite/public' olmalı
          path: ./public 

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4