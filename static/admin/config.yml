backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "docs"
    label: "Dökümanlar ve Modüller"
    folder: "content/docs" # Tüm taramanın başlayacağı kök klasör
    extension: "md"
    format: "frontmatter"
    create: true

    # 1. KRİTİK AYAR: Alt klasörleri CMS'e tanıtır
    nested: true

    # 2. KRİTİK AYAR: Dosyaların yerini bozmadan kaydeder
    # {{dirname}}: Dosyanın bulunduğu klasör yolunu korur (moduller/modül 1 gibi)
    # {{slug}}: Dosya adını korur
    path: "{{dirname}}/{{slug}}"

    # Klasörlerin içindeki _index.md dosyalarını da görebilmek için:
    filter: {field: "title", value: ".*"}

    fields:
      - {label: "Başlık", name: "title", widget: "string"}
      - {label: "İçerik", name: "body", widget: "markdown"}
      - {label: "Sıralama (Weight)", name: "weight", widget: "number", required: false}
      - {label: "Kitap Menüsü mü?", name: "bookFlatSection", widget: "boolean", default: false, required: false}
