backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "docs"
    label: "Dökümanlar ve Modüller"
    folder: "content/docs"
    extension: "md"
    format: "frontmatter"
    create: true

    # HATAYI ÇÖZEN KISIM: nested artık bir obje
    nested:
      depth: 10 # Kaç alt klasör derine kadar tarasın? (10 yeterli olur)
      summary: "{{title}}" # Klasör ağacında ne görünsün?

    # Alt klasör yapısını korumak için path ayarı kalmalı
    path: "{{dirname}}/{{slug}}"
    slug: "{{slug}}"

    fields:
      - {label: "Başlık", name: "title", widget: "string"}
      - {label: "İçerik", name: "body", widget: "markdown"}
      - {label: "Sıralama (Weight)", name: "weight", widget: "number", required: false}
